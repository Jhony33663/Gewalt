<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, minimum-scale=1">
    <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico">
    <title>GEWALT - Admin de productos y stock</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400&family=Raleway:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="assets/css/main.css">
    <link rel="stylesheet" type="text/css" href="assets/css/gewalt.css">
</head>
<body>
    <div class="page-container">
        <header class="header">
            <div class="header__main">
                <div class="header__cols">
                    <div class="header__left">
                        <div class="header__cols">
                            <div class="header__col"><a class="logo" href="index.html"><span class="gewalt-logo-text">gewalt</span></a></div>
                            <div class="header__col header__col_hide-mob">
                                <nav class="header-nav">
                                    <ul class="header-nav__list">
                                        <li class="header-nav__item"><a class="header-nav__link" href="index.html">Home</a></li>
                                        <li class="header-nav__item"><a class="header-nav__link" href="shop.html">Catálogo</a></li>
                                        <li class="header-nav__item"><a class="header-nav__link" href="checkout-1.html">Checkout</a></li>
                                        <li class="header-nav__item active"><a class="header-nav__link" href="admin.html">Admin</a></li>
                                    </ul>
                                </nav>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </header>
        <main class="main">
            <section class="gewalt-admin wrapper" id="gewalt-admin-app">
                <div class="gewalt-admin__top">
                    <div>
                        <span class="category-subtitle"><b>GEWALT</b> backend mock</span>
                        <h1 class="gewalt-admin__title">Panel de productos y stock</h1>
                        <p class="gewalt-admin__subtitle">Admin tangible en HTML + localStorage. Todo lo que guardes aquí se refleja en <a href="shop.html">shop.html</a> y <a href="product_page.html">product_page.html</a>.</p>
                    </div>
                    <div class="gewalt-admin-actions">
                        <button class="gewalt-btn" id="gewalt-new-product">Nuevo producto</button>
                        <button class="gewalt-btn gewalt-btn--light" id="gewalt-reset-products">Restaurar seed</button>
                    </div>
                </div>
                <div class="gewalt-admin__grid">
                    <section class="gewalt-panel">
                        <h2 class="checkout-form__title">Catálogo (<span data-count>0</span>)</h2>
                        <div class="gewalt-table-wrap">
                            <table class="gewalt-table">
                                <thead>
                                    <tr><th>Producto</th><th>Precio</th><th>Color</th><th>Stock por talla</th><th>Total</th><th>Estado</th><th>Acciones</th></tr>
                                </thead>
                                <tbody id="gewalt-products-body"></tbody>
                            </table>
                        </div>
                    </section>
                    <section class="gewalt-panel gewalt-panel--white">
                        <h2 class="checkout-form__title" id="gewalt-form-title">Crear producto</h2>
                        <form class="gewalt-admin-form" id="gewalt-product-form">
                            <input type="hidden" name="id">
                            <div class="gewalt-field"><label>Nombre</label><input name="name" placeholder="Gewalt- Max three" required></div>
                            <div class="gewalt-form-grid">
                                <div class="gewalt-field"><label>Precio USD</label><input name="price" type="number" min="0" step="0.01" value="34"></div>
                                <div class="gewalt-field"><label>Color</label><input name="color" placeholder="Negro"></div>
                            </div>
                            <div class="gewalt-field"><label>URL de imagen</label><input name="image" placeholder="https://..."></div>
                            <div class="gewalt-field"><label>Descripción</label><textarea name="description" placeholder="Descripción comercial del hoodie"></textarea></div>
                            <div>
                                <label class="checkout-form__title" style="font-size:16px">Stock por talla</label>
                                <div class="gewalt-stock-grid">
                                    <div class="gewalt-field"><label>S</label><input name="stockS" type="number" min="0" value="0"></div>
                                    <div class="gewalt-field"><label>M</label><input name="stockM" type="number" min="0" value="0"></div>
                                    <div class="gewalt-field"><label>L</label><input name="stockL" type="number" min="0" value="0"></div>
                                    <div class="gewalt-field"><label>XL</label><input name="stockXL" type="number" min="0" value="0"></div>
                                </div>
                            </div>
                            <label><input name="active" type="checkbox" checked> Producto activo en catálogo</label>
                            <label><input name="featured" type="checkbox"> Producto destacado</label>
                            <button class="gewalt-btn" type="submit">Guardar producto</button>
                            <div class="gewalt-admin-message" id="gewalt-admin-message"></div>
                        </form>
                    </section>
                </div>
            </section>
        </main>
    </div>
    <script src="assets/js/gewalt-store.js"></script>
</body>
</html>
