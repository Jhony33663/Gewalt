services:
  saleor:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    volumes:
      - saleor-media:/app/media
    command: >
      sh -c "python manage.py migrate --no-input &&
             uvicorn saleor.asgi:application
             --host=0.0.0.0 --port=8000 --workers=2
             --lifespan=auto --ws=none
             --no-server-header --no-access-log
             --timeout-keep-alive=35
             --timeout-graceful-shutdown=30
             --limit-max-requests=10000"

  dashboard:
    image: ghcr.io/saleor/saleor-dashboard:3.23
    restart: unless-stopped
    ports:
      - "9000:80"
    environment:
      API_URI: "http://142.93.12.243:8000/graphql/"
      API_URL: "http://142.93.12.243:8000/graphql/"
      LOCALE_CODE: "es"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: "http://142.93.12.243:8000/graphql/"
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://142.93.12.243:8000/graphql/"

  db:
    image: docker.io/library/postgres:15-alpine
    restart: unless-stopped
    volumes:
      - saleor-db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: saleor
      POSTGRES_PASSWORD: saleor
      POSTGRES_DB: saleor
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saleor"]
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: docker.io/valkey/valkey:8.1-alpine
    restart: unless-stopped
    volumes:
      - saleor-cache:/data

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
      - cache
    command: celery -A saleor --app=saleor.celeryconf:app worker --loglevel=info -B

volumes:
  saleor-db:
    driver: local
  saleor-cache:
    driver: local
  saleor-media:
    driver: local
